<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="shortcut icon" href="./assets/moeda-logo.png" type="image/x-icon">

    <title>Conversor de Moedas</title>

</head>

<body>



    <img class="logo" src="imgs/ChatGPT Image 10 de mar. de 2026, 21_41_10.png" alt="logo-conversor-de-moedas">



    <main>

        <label>

            Converter <b>de</b>

            <select>

                <option value="Real" >R$ Real Brasileiro</option>
                <option value="euro">€ Euro</option>
                <option value="dolar">US$ Dólar Americano</option>

            </select>

        </label>



        <label>

            Converter <b>para</b>

            <select id="select-currency" class="moedas-a-escolher">

                <option value="Real" >R$ Real Brasileiro</option>

                <option value="dolar">US$ Dólar Americano</option>

                <option value="euro">€ Euro</option>


            </select>

        </label>



        <label>

            Valor

            <input id="ValueReal" class="input-valor" placeholder="R$10.000,00">

        </label>



        <button id="convert-button" class="buttonConverte">Converter</button>


        <section>

            <div class="caixas">

                <img id="moeda-img" src="imgs/Gemini_Generated_Image_6nmbgl6nmbgl6nmb (1).png" alt="logo-moeda">

                <p class="moeda">Real Brasileiro</p>

                <p id="ValorReal" class="valor-moeda-01">R$ 0,00</p>

            </div>



            <div class="seta-img">

                <img src="imgs/seta.png" alt="seta">

            </div>



            <div class="caixas">

                <img id="moeda-img" src="imgs/Gemini_Generated_Image_15gff515gff515gf-Photoroom.png" width="200px">
                <p class="moeda" id="moeda-nome">Dólar Americano</p>
                <p id="ValorDolar" class="valor-moeda-02">US$ 0,00</p>

            </div>

        </section>



    </main>

    

    <footer>

    </footer>

    <script src="./scripts.js"></script>
    
</body>


</html>
